name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend — pytest against a live PostgreSQL 16 + pgvector container
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests (Python 3.13)
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 bundles the vector extension; the official
        # postgres:16 image does NOT include it and will fail CREATE EXTENSION.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hireport
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: hireport_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hireport"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: hireportai/hirelens-backend

    env:
      # Both variables point at the same CI DB.
      # TEST_DATABASE_URL  → used by conftest.py for pytest integration tests.
      # DATABASE_URL       → used by alembic/env.py (needs +asyncpg scheme).
      TEST_DATABASE_URL: postgresql+asyncpg://hireport:ci_password@localhost:5432/hireport_test
      DATABASE_URL: postgresql+asyncpg://hireport:ci_password@localhost:5432/hireport_test
      # Auth + LLM stub values — real secrets live in GitHub Actions secrets.
      JWT_SECRET_KEY: test-secret-key-for-ci
      JWT_ALGORITHM: HS256
      LLM_FAST_PROVIDER: google
      LLM_REASONING_PROVIDER: google
      GEMINI_API_KEY: test-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: hireportai/hirelens-backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short -m "not integration"

  # ---------------------------------------------------------------------------
  # Job 2: Frontend — vitest
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Tests (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hireportai/hirelens-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hireportai/hirelens-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        # --passWithNoTests is also set in vite.config.ts; the CLI flag is kept
        # here so the intent is visible in the workflow log.
        run: npm test

  # ---------------------------------------------------------------------------
  # Job 3: Migration rollback — upgrade → downgrade -1 → upgrade
  # ---------------------------------------------------------------------------
  migration-rollback:
    name: Migration Rollback (Python 3.13)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hireport
          POSTGRES_PASSWORD: ci_password
          # Separate DB name from backend-tests for clarity in logs.
          POSTGRES_DB: hireport_migrate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hireport"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: hireportai/hirelens-backend

    env:
      DATABASE_URL: postgresql+asyncpg://hireport:ci_password@localhost:5432/hireport_migrate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          # Production deps only — no pytest needed for migration checks.
          cache-dependency-path: hireportai/hirelens-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: alembic upgrade head
        run: alembic upgrade head

      - name: alembic downgrade -1
        run: alembic downgrade -1

      - name: alembic upgrade head (idempotency re-check)
        run: alembic upgrade head
