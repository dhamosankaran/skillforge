<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillForge Daily Reminder</title>
</head>
<body style="margin:0;padding:0;background-color:#0A0A0B;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0A0A0B;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#18181B;border-radius:12px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:24px 32px;background:linear-gradient(135deg,#6366F1,#8B5CF6);text-align:center;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#FFFFFF;">SkillForge</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px;font-size:18px;color:#F4F4F5;">
                Hey {{name}}!
              </p>
              <p style="margin:0 0 8px;font-size:16px;color:#A1A1AA;">
                &#128218; <strong style="color:#F4F4F5;">{{cards_due}}</strong> cards due today
              </p>
              <p style="margin:0 0 24px;font-size:16px;color:#A1A1AA;">
                &#128293; <strong style="color:#F4F4F5;">{{streak}}</strong>-day streak
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:8px;padding:12px 28px;">
                    <a href="{{study_link}}" style="color:#FFFFFF;text-decoration:none;font-size:16px;font-weight:600;">
                      Start Studying &rarr;
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:16px 32px;border-top:1px solid #27272A;text-align:center;">
              <p style="margin:0;font-size:12px;color:#71717A;">
                You're receiving this because you opted in to daily reminders.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
