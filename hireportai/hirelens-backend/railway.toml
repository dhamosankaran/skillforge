[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# $PORT is injected by Railway at runtime; shell form expands it correctly.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
# Runs after the image is built, before traffic is switched to the new deploy.
releaseCommand = "alembic upgrade head"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
