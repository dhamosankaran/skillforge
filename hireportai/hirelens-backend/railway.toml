[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# $PORT is injected by Railway at runtime; shell form expands it correctly.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
# Runs after the image is built, before traffic is switched to the new deploy.
releaseCommand = "alembic upgrade head"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Phase 6 slice 6.14 — daily Pro digest cron (B-098).
# Spec: docs/specs/phase-6/14-daily-digest-cron.md §12 D-1 + D-2.
# Schedule per D-1 = daily once at 14:00 UTC (≈10am ET / 7am PT / 7:30pm IST).
# Command per D-2 = CLI script entry; spawns a separate process from the
# deployed image (does NOT share memory with the running uvicorn server).
[[cron]]
schedule = "0 14 * * *"
command = "python -m app.scripts.send_pro_digest"
